name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pytest ruff

      - name: Byte-compile all modules
        run: python -m compileall -q vc_translator

      - name: Run tests
        run: python -m pytest -q

      - name: Lint (advisory)
        continue-on-error: true
        run: ruff check vc_translator

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check the web UI
        run: node --check vc_translator/webui/app.js
